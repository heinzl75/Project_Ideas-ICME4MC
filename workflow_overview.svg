<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">ICME4CRASH Workflow Overview</title>
  <desc id="desc">Workflow mit eingebetteten Pixel-Bildern für die ICME-Prozesskette.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="960" y="88" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" fill="#0f172a">
    ICME4CRASH – Workflow Overview
  </text>
  <text x="960" y="130" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" fill="#334155">
    Mit eingebetteten Pixel-Bildern je Prozessschritt
  </text>

  <!-- Cards -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g id="s1" transform="translate(95, 215)">
      <rect width="300" height="620" rx="22" fill="#ffffff" stroke="#cdd7e5" stroke-width="2"/>
      <image x="24" y="26" width="252" height="410" preserveAspectRatio="xMidYMid meet" href="step1_thermo_kinetics.png"/>
      <text x="150" y="475" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">1. Thermo-Kinetik</text>
      <text x="150" y="509" text-anchor="middle" font-size="18" fill="#334155">CALPHAD + Kinetik</text>
      <text x="150" y="540" text-anchor="middle" font-size="18" fill="#334155">Phasen &amp; Ausscheidungen</text>
    </g>

    <g id="s2" transform="translate(420, 215)">
      <rect width="300" height="620" rx="22" fill="#ffffff" stroke="#cdd7e5" stroke-width="2"/>
      <image x="24" y="26" width="252" height="410" preserveAspectRatio="xMidYMid meet" href="step2_microstructure_cube.png"/>
      <text x="150" y="475" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">2. SVE-Generierung</text>
      <text x="150" y="509" text-anchor="middle" font-size="18" fill="#334155">Stochastische Gefüge</text>
      <text x="150" y="540" text-anchor="middle" font-size="18" fill="#334155">digitale Zwillinge</text>
    </g>

    <g id="s3" transform="translate(745, 215)">
      <rect width="300" height="620" rx="22" fill="#ffffff" stroke="#cdd7e5" stroke-width="2"/>
      <image x="24" y="26" width="252" height="410" preserveAspectRatio="xMidYMid meet" href="step3_crystal_plasticity.png"/>
      <text x="150" y="475" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">3. Kristallplastizität</text>
      <text x="150" y="509" text-anchor="middle" font-size="18" fill="#334155">CPFFT / CPFEM</text>
      <text x="150" y="540" text-anchor="middle" font-size="18" fill="#334155">virtuelle Prüfungen</text>
    </g>

    <g id="s4" transform="translate(1070, 215)">
      <rect width="300" height="620" rx="22" fill="#ffffff" stroke="#cdd7e5" stroke-width="2"/>
      <image x="24" y="26" width="252" height="410" preserveAspectRatio="xMidYMid meet" href="step4_failure_surface.png"/>
      <text x="150" y="475" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">4. Surrogate + KI</text>
      <text x="150" y="509" text-anchor="middle" font-size="18" fill="#334155">Datenverdichtung</text>
      <text x="150" y="540" text-anchor="middle" font-size="18" fill="#334155">Versagensflächen</text>
    </g>

    <g id="s5" transform="translate(1395, 215)">
      <rect width="300" height="620" rx="22" fill="#ffffff" stroke="#cdd7e5" stroke-width="2"/>
      <image x="24" y="26" width="252" height="410" preserveAspectRatio="xMidYMid meet" href="step5_material_card.png"/>
      <text x="150" y="475" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">5. Materialkarte</text>
      <text x="150" y="509" text-anchor="middle" font-size="18" fill="#334155">GISSMO / MMC</text>
      <text x="150" y="540" text-anchor="middle" font-size="18" fill="#334155">Crash-ready Output</text>
    </g>
  </g>

  <!-- Flow arrows -->
  <g stroke="#334155" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="395" y1="525" x2="414" y2="525"/>
    <line x1="720" y1="525" x2="739" y2="525"/>
    <line x1="1045" y1="525" x2="1064" y2="525"/>
    <line x1="1370" y1="525" x2="1389" y2="525"/>
  </g>

  <!-- Final overview callout -->
  <g transform="translate(735, 880)" filter="url(#shadow)">
    <rect width="450" height="150" rx="20" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <image x="20" y="20" width="110" height="110" preserveAspectRatio="xMidYMid meet" href="step6_workflow_overview.png"/>
    <text x="150" y="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Workflow-Übersicht</text>
    <text x="150" y="102" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Konsolidierte Pipeline für ICME4CRASH</text>
  </g>
</svg>
